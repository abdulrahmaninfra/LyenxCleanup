name: Package and Release OneFile

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Allows the workflow to create the release and upload files

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # pip install -r requirements.txt # Uncomment if your script needs external libraries

    - name: Build with PyInstaller (One File)
      run: |
        pyinstaller --noconfirm --onefile --console --icon "icon.ico" --name "Lyenx Cleanup" --uac-admin "main.py"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Lyenx Cleanup.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false